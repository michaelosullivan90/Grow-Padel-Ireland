<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Grow Padel Ireland</title>
    <meta name="description" content="Contact Grow Padel Ireland and register your interest in helping padel grow across Ireland.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1 class="logo">Grow Padel Ireland</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="what-is-padel.html">What Is Padel?</a></li>
                    <li><a href="padel-in-ireland.html">Padel in Ireland</a></li>
                    <li><a href="get-involved.html">Get Involved</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="page-banner">
            <div class="container">
                <h2>Join the Movement</h2>
                <p>Register your interest in padel in Ireland.</p>
            </div>
        </section>

        <section class="form-section">
            <div class="container">
                <h2>Contact Form</h2>
                <form id="contactForm">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name">

                    <label for="email">Email Address</label>
                    <input type="text" id="email" name="email">

                    <label for="county">County</label>
                    <select id="county" name="county">
                        <option value="">Choose your county</option>
                        <option>Dublin</option>
                        <option>Cork</option>
                        <option>Galway</option>
                        <option>Limerick</option>
                        <option>Kerry</option>
                        <option>Clare</option>
                        <option>Other</option>
                    </select>

                    <label for="experience">Experience Level</label>
                    <select id="experience" name="experience">
                        <option value="">Choose your level</option>
                        <option>Complete Beginner</option>
                        <option>Beginner</option>
                        <option>Intermediate</option>
                        <option>Advanced</option>
                    </select>

                    <label for="interest">Why are you interested in padel?</label>
                    <select id="interest" name="interest">
                        <option value="">Choose one</option>
                        <option>Trying a new sport</option>
                        <option>Fitness and exercise</option>
                        <option>Social activity</option>
                        <option>Club or coaching interest</option>
                    </select>

                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5"></textarea>

                    <label class="checkbox-label">
                        <input type="checkbox" id="updates">
                        I would like updates about padel in Ireland
                    </label>

                    <button type="submit" class="btn">Submit</button>
                </form>

                <div id="formMessage"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Grow Padel Ireland. Promoting padel across the country.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
